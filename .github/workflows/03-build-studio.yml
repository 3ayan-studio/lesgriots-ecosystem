name: "🏗️ Build: Studio (VPS)"
on:
  workflow_call:

jobs:
  deploy-vps:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Prepare and Build Studio
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            TAG_NAME="${{ github.ref_name }}"
            RELEASE_DIR="/var/www/ecosystem/releases/release-$TAG_NAME"

            echo "=========================================="
            echo "🏗️ BUILDING STUDIO: $TAG_NAME"
            echo "=========================================="

            cd $RELEASE_DIR/studio

            echo "📝 Injecting Environment Variables (.env)..."
            echo "SANITY_STUDIO_AGENCY_PROJECT_ID=${{ secrets.SANITY_AGENCY_PROJECT_ID }}" >> .env
            echo "SANITY_STUDIO_AGENCY_DATASET=${{ secrets.SANITY_AGENCY_DATASET }}" >> .env
            echo "SANITY_STUDIO_AGENCY_API_VERSION=${{ secrets.SANITY_AGENCY_API_VERSION }}" >> .env
            echo "SANITY_STUDIO_AGENCY_STUDIO_APP_ID=${{ secrets.SANITY_AGENCY_STUDIO_APP_ID }}" >> .env

            echo "📦 Running npm ci (Studio)..."
            npm ci --legacy-peer-deps

            echo "🔨 Running Sanity Build..."
            npm run build

            echo "✅ Studio Build Complete!"
